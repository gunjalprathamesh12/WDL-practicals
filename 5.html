<!doctype html>
<html>
  <head>
    <title>Feedback Form</title>
    <style>
      body {
        font-family: Arial;
        background: #f9f9f9;
      }
      form {
        width: 400px;
        margin: auto;
        padding: 20px;
        background: #fff;
        border: 1px solid #ccc;
      }
      textarea {
        width: 100%;
        height: 100px;
        margin: 5px 0;
      }
      button {
        background: #e67e22;
        color: white;
        padding: 10px;
        border: none;
        cursor: pointer;
      }
    </style>
    <script>
      function validateFeedback() {
        let feedback = document.forms["fbForm"]["feedback"].value;
        if (feedback == "") {
          alert("Feedback cannot be empty!");
          return false;
        }
        alert("Thank you for your feedback!");
        return true;
      }
    </script>
  </head>
  <body>
    <form name="fbForm" onsubmit="return validateFeedback();">
      <h2>Feedback Form</h2>
      <textarea name="feedback" placeholder="Enter your feedback"></textarea>
      <p>Rate Us:</p>
      <input type="radio" name="rating" value="Good" /> Good
      <input type="radio" name="rating" value="Average" /> Average
      <input type="radio" name="rating" value="Poor" /> Poor <br /><br />
      <button type="submit">Submit</button>
    </form>
  </body>
</html>
